{% extends 'pets/base.html' %}

{% block title %}Adotar {{ pet.nome }}{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 40px auto; padding: 30px; background-color: #fff; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.12); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #333;">
    <h2 style="font-weight: 900; margin-bottom: 25px; color: #28a745;">Adotar {{ pet.nome }}</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" style="
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 7px 18px rgba(40,167,69,0.6);
            transition: background-color 0.3s ease;
        " onmouseover="this.style.backgroundColor='#1e7e34';" onmouseout="this.style.backgroundColor='#28a745';">Enviar Pedido de Adoção</button>
    </form>

    <a href="{% url 'pet_detalhe' pet.id %}" style="
        display: inline-block;
        margin-top: 20px;
        color: #007bff;
        text-decoration: none;
        font-weight: 700;
    ">← Voltar para {{ pet.nome }}</a>
</div>
{% endblock %}
